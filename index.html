<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu 💗</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center/cover;
}

.blur{
  position:absolute;
  inset:0;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.5);
}

.container{
  position:relative;
  z-index:2;
  text-align:center;
  color:white;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  background:url("https://i.imgur.com/3ZQ3Z4N.png") center/cover;
  margin:auto;
  border:4px solid rgba(255,255,255,0.5);
  box-shadow:0 0 25px rgba(255,255,255,0.5);
}

.box{
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  width:260px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  cursor:pointer;
  transition:0.3s;
}

.box:hover{
  transform:scale(1.05);
}

.small{
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="blur"></div>

<div class="container">

  <div class="avatar"></div>

  <div class="box" onclick="next()">
    <h2 id="text1">eh halo kamu 😆✨</h2>
    <p id="text2">gw mau ngomong sesuatu nih...</p>
    <div class="small">klik pelan ya 😳</div>
  </div>

</div>

<script>

let step=0;

function next(){

  step++;

  if(step==1){
    text1.innerHTML="eh serius bentar ya...";
    text2.innerHTML="lu lagi sibuk ga sih sekarang 😅";
  }

  else if(step==2){
    text1.innerHTML="soalnya gini...";
    text2.innerHTML="gw rada kepikiran lu akhir akhir ini 😭";
  }

  else if(step==3){
    text1.innerHTML="aneh sih emang...";
    text2.innerHTML="padahal cuma liat lu bentar aja bisa senyum sendiri 😳";
  }

  else if(step==4){
    text1.innerHTML="dan jujur ya...";
    text2.innerHTML="gw ngerasa nyaman banget sama lu 🫠";
  }

  else if(step==5){
    text1.innerHTML="kayak...";
    text2.innerHTML="lu tuh beda aja gitu dari yang lain 💗";
  }

  else if(step==6){
    text1.innerHTML="jadi intinya...";
    text2.innerHTML="kayaknya gw suka deh sama lu 🥺";
  }

  else if(step==7){
    text1.innerHTML="jadi gini aja ya...";
    text2.innerHTML="lu mau ga jadi orang spesial gw? 💞";
  }

  else if(step==8){
    window.location.href="https://wa.me/6282310312670?text=jujur ya... gw juga suka sama lu 💗";
  }

}

</script>

</body>
</html>
