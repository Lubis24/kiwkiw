<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bucin Mode 💗</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center/cover;
}

.blur{
  position:absolute;
  inset:0;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.5);
}

.container{
  position:relative;
  z-index:2;
  text-align:center;
  color:white;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:auto;
  overflow:hidden;
  box-shadow:0 0 25px rgba(255,255,255,0.5);
}

/* PANDA GIF */
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LOVE FLOAT */
.heart{
  position:absolute;
  color:red;
  font-size:20px;
  animation:float 2s infinite;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-40px);opacity:0;}
}

/* BOX */
.box{
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  width:260px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  cursor:pointer;
  transition:0.3s;
}

.box:hover{
  transform:scale(1.05);
}

.small{
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="blur"></div>

<div class="container">

  <!-- PANDA GIF LUCU -->
  <div class="avatar">
    <img src="https://media.tenor.com/4Xb9E4vZJpEAAAAC/panda-cute.gif">
  </div>

  <div class="box" onclick="next()">
    <h2 id="text1">eh halo kamu 😆✨</h2>
    <p id="text2">gw mau ngomong sesuatu nih...</p>
    <div class="small">klik pelan ya 😳</div>
  </div>

</div>

<script>

let step=0;

function next(){

  createLove();

  step++;

  if(step==1){
    text1.innerHTML="eh serius bentar ya...";
    text2.innerHTML="lu lagi sibuk ga sih 😅";
  }

  else if(step==2){
    text1.innerHTML="soalnya gini...";
    text2.innerHTML="gw kepikiran lu terus 😭";
  }

  else if(step==3){
    text1.innerHTML="jujur ya...";
    text2.innerHTML="tiap liat lu tuh senyum sendiri 😳";
  }

  else if(step==4){
    text1.innerHTML="dan anehnya...";
    text2.innerHTML="gw nyaman banget sama lu 🫠";
  }

  else if(step==5){
    text1.innerHTML="kayak...";
    text2.innerHTML="lu tuh beda dari yang lain 💗";
  }

  else if(step==6){
    text1.innerHTML="jadi intinya...";
    text2.innerHTML="gw suka sama lu 🥺";
  }

  else if(step==7){
    text1.innerHTML="jadi gini...";
    text2.innerHTML="lu mau ga jadi orang spesial gw? 💞";
  }

  else if(step==8){
    window.location.href="https://wa.me/6282310312670?text=jujur ya... gw juga suka sama lu 💗";
  }

}

/* efek love */
function createLove(){
  const heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💗";
  heart.style.left=Math.random()*100+"%";
  heart.style.top="50%";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),2000);
}

</script>

</body>
</html>
